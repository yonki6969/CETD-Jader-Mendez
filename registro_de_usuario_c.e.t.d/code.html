<body class="bg-background text-on-background min-h-screen selection:bg-secondary-container selection:text-on-secondary-container font-body-md overflow-x-hidden">
<main class="flex min-h-screen">
<!-- Visual Sidebar (Editorial Image) -->
<div class="hidden lg:flex lg:w-1/2 relative side-visual overflow-hidden items-center justify-center p-margin-desktop" data-alt="A sophisticated editorial photograph of a historic European library with high oak bookshelves filled with leather-bound books. The lighting is soft and golden, filtering through large arched windows to create a warm, academic atmosphere. The aesthetic is professional and timeless, emphasizing a world of knowledge and scholarly pursuit. Soft dust motes dance in the light, contributing to a sense of quiet focus and intellectual depth.">
<div class="z-10 text-white max-w-lg text-center">
<h1 class="font-display text-headline-lg mb-stack-md leading-tight">Excelencia en el Desarrollo Tecnológico</h1>
<div class="w-16 h-1 bg-secondary mx-auto mb-stack-lg"></div>
<p class="font-body-lg italic opacity-90">"La educación es el arma más poderosa que puedes usar para cambiar el mundo."</p>
</div>
</div>
<!-- Registration Content -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-surface">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-12">
<img alt="C.E.T.D. Logo" class="w-32 h-auto mb-6 transition-transform hover:scale-105 duration-500" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBifU2Bb4po9qFFovzISgBZYrhZZ4FHJUDY8wD8G-NbMS_vBklKaB6wmUJc43S3ouw3C2puO31Gc-Iuj4pCB8yWZIA63ted5SA0rqFXQVI2l6QgTmwMIoZzAOQsY7Zr8RLQDNTJu-dKy1OD_3F340wLTqEBhx73aou7kinrMW4hHHSZ4KtjFPg98Mz_LGdkTjfD3q317ELeobBkulUYMmnCwk6lQHENXHhil_8ASXlfYbB5RiHFclHHv21xYLJ5BhveHO9tMuIeEtU"/>
<h2 class="font-display text-headline-md text-primary tracking-tight">Crear una Cuenta</h2>
<p class="font-label-lg text-on-surface-variant mt-2">Plataforma Académica C.E.T.D.</p>
</div>
<!-- Registration Form -->
<form class="space-y-8" id="registrationForm">
<div class="space-y-6">
<!-- Full Name -->
<div class="group">
<label class="block font-label-md text-on-surface-variant mb-1 uppercase tracking-wider" for="fullname">Nombre Completo</label>
<input class="form-input-minimal w-full font-body-md text-primary focus:outline-none" id="fullname" name="fullname" placeholder="Juan Pérez" required="" type="text"/>
</div>
<!-- Email -->
<div class="group">
<label class="block font-label-md text-on-surface-variant mb-1 uppercase tracking-wider" for="email">Correo Electrónico</label>
<input class="form-input-minimal w-full font-body-md text-primary focus:outline-none" id="email" name="email" placeholder="juan.perez@ejemplo.com" required="" type="email"/>
</div>
<!-- Username -->
<div class="group">
<label class="block font-label-md text-on-surface-variant mb-1 uppercase tracking-wider" for="username">Nombre de Usuario</label>
<input class="form-input-minimal w-full font-body-md text-primary focus:outline-none" id="username" name="username" placeholder="jperez2024" required="" type="text"/>
</div>
<!-- Password -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="group">
<label class="block font-label-md text-on-surface-variant mb-1 uppercase tracking-wider" for="password">Contraseña</label>
<div class="relative">
<input class="form-input-minimal w-full font-body-md text-primary focus:outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-0 bottom-1 text-on-surface-variant hover:text-primary" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<div class="group">
<label class="block font-label-md text-on-surface-variant mb-1 uppercase tracking-wider" for="confirm_password">Confirmar</label>
<div class="relative">
<input class="form-input-minimal w-full font-body-md text-primary focus:outline-none" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-0 bottom-1 text-on-surface-variant hover:text-primary" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3">
<input class="mt-1 rounded border-outline text-secondary focus:ring-secondary" id="terms" required="" type="checkbox"/>
<label class="font-label-md text-on-surface-variant leading-relaxed" for="terms">
                            Acepto los <a class="text-secondary hover:underline font-semibold" href="#">Términos de Servicio</a> y la <a class="text-secondary hover:underline font-semibold" href="#">Política de Privacidad</a> institucional.
                        </label>
</div>
<!-- CTA -->
<div class="pt-4 space-y-4">
<button class="w-full bg-secondary text-on-secondary font-label-lg py-4 px-8 rounded hover:brightness-110 active:scale-[0.98] transition-all flex justify-center items-center gap-2 group" type="submit">
<span>REGISTRARSE</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="text-center pt-2">
<span class="font-body-md text-on-surface-variant">¿Ya tienes una cuenta? </span>
<a class="font-label-lg text-primary border-b border-primary hover:text-secondary hover:border-secondary transition-colors" href="#">
                                INICIAR SESIÓN
                            </a>
</div>
</div>
</form>
<!-- Footer academic credit -->
<div class="mt-16 pt-8 border-t border-outline-variant text-center">
<p class="font-label-md text-on-surface-variant opacity-70">
                        © 2024 C.E.T.D. Jader Mendez. Sistema de Gestión Editorial de Alto Rendimiento.
                    </p>
</div>
</div>
</div>
</main>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            const icon = input.nextElementSibling.querySelector('span');
            icon.innerText = type === 'password' ? 'visibility' : 'visibility_off';
        }

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (pass !== confirm) {
                alert('Las contraseñas no coinciden. Por favor verifique.');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span> <span>PROCESANDO...</span>`;
            
            setTimeout(() => {
                alert('Solicitud de registro enviada. Por favor revise su correo institucional.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }, 1500);
        });
    </script>
