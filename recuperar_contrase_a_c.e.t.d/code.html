<h1 class="font-headline-sm text-headline-sm text-primary tracking-tight">¿Olvidaste tu contraseña?</h1>
<p class="mt-4 px-10 text-center text-on-surface-variant font-body-md text-body-md">
                No te preocupes. Introduce la dirección de correo electrónico asociada a tu cuenta y te enviaremos las instrucciones para restablecerla.
            </p>
</div>
<!-- Form Section -->
<form class="p-8 md:p-10 space-y-stack-md" id="forgotPasswordForm">
<!-- Input Group -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">
                    Correo Electrónico
                </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all duration-200 font-body-md text-body-md" id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary text-on-secondary py-4 font-label-lg text-label-lg uppercase tracking-widest hover:bg-on-secondary-fixed-variant transition-colors duration-300 active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
                Enviar Instrucciones de Recuperación
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer / Navigation -->
<div class="bg-surface-container-low p-6 text-center border-t border-primary/5">
<a class="inline-flex items-center gap-2 font-label-lg text-label-lg text-secondary hover:text-on-secondary-fixed-variant transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Volver al Inicio de Sesión
            </a>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary via-primary to-secondary"></div>
<script>
        // Simple Interaction logic
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Enviando...';
            
            // Mock success feedback
            setTimeout(() => {
                btn.classList.replace('bg-secondary', 'bg-green-600');
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Instrucciones Enviadas';
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-secondary');
                    btn.innerHTML = originalText;
                }, 3000);
            }, 1500);
        });
    </script>
