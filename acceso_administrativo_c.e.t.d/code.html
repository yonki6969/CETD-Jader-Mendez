<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Header -->
<header class="fixed top-0 w-full z-50 h-20 flex items-center px-6 md:px-margin-desktop max-w-[1280px] mx-auto justify-between">

</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-0 py-section-gap">
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="login-card bg-surface-container-lowest/90 p-8 md:p-12 rounded-xl flex flex-col gap-stack-lg">
<!-- Logo & Heading -->
<div class="text-center">
<img alt="Logo C.E.T.D. Jader Mendez" class="w-32 h-auto mx-auto mb-6 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuASpQWR2FfSKcuxO8kkikw-0fTbMI1gLKqf29Ibcg7PU9Bbv3EIA8oEqXCux8YSNt4gcP6QJrgsGjKOGZKabBn1YQ2ZIxB-ckqvpQOlEuFwmieIx_SUclDs7fBkAHm5aF57UzsI3-yA_p6OJebsq4IG68LG1ZxlrZnvT9vKitcn5t8vyI-KaanFbG07NL-tw99Grf779KlFEYqWXpO61YEl4RKYV_2OrtwAkZkd7uhg7Wd92NRRE9NwXGbz37URd9czzOC49R3BSuM"/>
<h1 class="font-headline-md text-headline-md text-primary mb-2">Bienvenido de nuevo</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Portal administrativo para el talento deportivo.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Username/Email Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="username">Usuario o Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none input-focus-effect transition-all" id="username" name="username" placeholder="usuario@cetdjm.edu.ve" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Contraseña</label>
<a class="font-label-md text-label-md text-secondary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none input-focus-effect transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" id="toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-2 py-2">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary" id="remember" name="remember" type="checkbox"/>
<label class="font-label-lg text-label-lg text-on-surface-variant" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-lg text-label-lg hover:bg-on-surface-variant transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2 shadow-sm uppercase tracking-widest" type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-2">
                ¿No tienes acceso? <a class="text-primary font-bold hover:underline" href="#">Solicitar credenciales</a>
</p>
</div>

<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Términos</a>
</div>
</div>
</footer>
<script>
    // Micro-interaction for password visibility
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

    toggleBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        iconSpan.textContent = type === 'password' ? 'visibility' : 'visibility_off';
    });

    // Simple button active state visual feedback
    const primaryBtn = document.querySelector('button[type="submit"]');
    primaryBtn.addEventListener('mousedown', () => primaryBtn.classList.add('scale-95'));
    primaryBtn.addEventListener('mouseup', () => primaryBtn.classList.remove('scale-95'));
    primaryBtn.addEventListener('mouseleave', () => primaryBtn.classList.remove('scale-95'));
</script>
